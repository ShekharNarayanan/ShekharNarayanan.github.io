  .stim { animation: stimFlicker 1.1s ease-in-out infinite; }

    0%,100% { opacity: 0.6; }

    54% { opacity: 0.05; }

  @keyframes stimFlickerTarget {
    0%,100% { opacity: 0.95; filter: drop-shadow(0 0 7px #3ecfff); }

</style>
